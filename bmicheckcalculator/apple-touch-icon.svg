<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d1a"/>
      <stop offset="100%" style="stop-color:#2d7d46"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b9fe8"/>
      <stop offset="30%" style="stop-color:#2d7d46"/>
      <stop offset="65%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="38" ry="38" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Track -->
  <path d="M 28 128 A 62 62 0 1 1 152 128" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="13" stroke-linecap="round"/>
  <!-- Color arc -->
  <path d="M 28 128 A 62 62 0 1 1 152 128" fill="none" stroke="url(#arc)" stroke-width="13" stroke-linecap="round" stroke-dasharray="175 25"/>
  <!-- Tick marks -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <line x1="90" y1="32" x2="90" y2="22"/>
    <line x1="51" y1="43" x2="46" y2="35"/>
    <line x1="24" y1="76" x2="16" y2="73"/>
    <line x1="129" y1="43" x2="134" y2="35"/>
    <line x1="156" y1="76" x2="164" y2="73"/>
  </g>
  <!-- Needle shadow -->
  <line x1="90" y1="118" x2="60" y2="55" stroke="rgba(0,0,0,0.3)" stroke-width="4" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="90" y1="118" x2="60" y2="55" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="90" cy="118" r="12" fill="white"/>
  <circle cx="90" cy="118" r="7" fill="#2d7d46"/>
  <circle cx="90" cy="118" r="3" fill="white"/>
  <!-- Label -->
  <text x="90" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="2">BMI</text>
  <text x="90" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="rgba(168,230,188,0.85)" letter-spacing="1">CHECK CALCULATOR</text>
</svg>
