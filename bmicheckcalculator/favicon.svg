<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d1a"/>
      <stop offset="100%" style="stop-color:#2d7d46"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b9fe8"/>
      <stop offset="30%" style="stop-color:#2d7d46"/>
      <stop offset="60%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Speedometer arc track -->
  <path d="M 10 46 A 22 22 0 1 1 54 46" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5" stroke-linecap="round"/>
  <!-- Colored active arc -->
  <path d="M 10 46 A 22 22 0 1 1 54 46" fill="none" stroke="url(#arc)" stroke-width="5" stroke-linecap="round" stroke-dasharray="69 7" stroke-dashoffset="0"/>
  <!-- Needle -->
  <line x1="32" y1="42" x2="32" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hub dot -->
  <circle cx="32" cy="42" r="4" fill="white"/>
  <circle cx="32" cy="42" r="2" fill="#2d7d46"/>
  <!-- BMI text -->
  <text x="32" y="59" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="rgba(255,255,255,0.9)" letter-spacing="1">BMI</text>
</svg>
